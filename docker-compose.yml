services:
  postgres:
    container_name: vault-postgres
    image: postgres:18.1-trixie
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-vault}
      POSTGRES_USER: ${POSTGRES_USER:-vault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vault123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-vault} -d ${POSTGRES_DATABASE:-vault}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    container_name: vault-backend
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - caddynet
    restart: unless-stopped

  frontend:
    container_name: vault-frontend
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        NEST_API_URL: ${NEST_API_URL:-http://backend:8000}
        NEXT_PUBLIC_NEST_API_URL: ${NEXT_PUBLIC_NEST_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_PROXY_BASE: ${NEXT_PUBLIC_API_PROXY_BASE:-/api}
        NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN:-http://localhost:3000}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEST_API_URL: ${NEST_API_URL:-http://backend:8000}
      NEXT_PUBLIC_NEST_API_URL: ${NEXT_PUBLIC_NEST_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_PROXY_BASE: ${NEXT_PUBLIC_API_PROXY_BASE:-/api}
      NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN:-http://localhost:3000}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - caddynet
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  caddynet:
    external: true
